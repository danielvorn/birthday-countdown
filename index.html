<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyz's Birthday Countdown 🎂</title>

<meta name="description" content="A countdown to Lyz's birthday, October 25 — plus a few gift options to choose from.">

<meta property="og:type" content="website">
<meta property="og:title" content="Lyz's Birthday Countdown 🎂">
<meta property="og:description" content="Counting down to October 25. Pick your gift below 🎁">
<meta property="og:image" content="https://danielvorn.github.io/dollar-a-day/og-image.png">
<meta property="og:url" content="https://danielvorn.github.io/dollar-a-day/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Lyz's Birthday Countdown 🎂">
<meta name="twitter:description" content="Counting down to October 25. Pick your gift below 🎁">
<meta name="twitter:image" content="https://danielvorn.github.io/dollar-a-day/og-image.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff6fa5;
    --hotpink: #ff3d8a;
    --gold: #ffd24a;
    --purple: #8a5cf6;
    --teal: #2dd4c8;
    --bg1: #2a0e3f;
    --bg2: #4a1259;
    --bg3: #1b0a33;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: linear-gradient(160deg, var(--bg1), var(--bg2) 45%, var(--bg3));
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 60px;
    overflow-x: hidden;
    position: relative;
  }

  .confetti, .balloon {
    position: fixed;
    top: -10vh;
    pointer-events: none;
    z-index: 0;
  }
  .confetti {
    font-size: 1.3rem;
    animation: fall linear infinite;
    opacity: 0.9;
  }
  .balloon {
    font-size: 2rem;
    animation: floatUp linear infinite;
    opacity: 0.85;
  }
  @keyframes fall {
    to { transform: translateY(115vh) rotate(360deg); }
  }
  @keyframes floatUp {
    from { transform: translateY(110vh) translateX(0); }
    to { transform: translateY(-15vh) translateX(20px); }
  }

  .topper { font-size: 2rem; text-align: center; margin-bottom: 2px; z-index: 1; }
  h1 {
    text-align: center;
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(2rem, 8vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(90deg, var(--pink), var(--gold), var(--teal));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    z-index: 1;
    letter-spacing: 0.5px;
  }
  .subtitle {
    text-align: center;
    color: #f0d9ff;
    margin-top: 8px;
    font-size: 1rem;
    font-weight: 500;
    z-index: 1;
  }

  .countdown {
    display: flex;
    gap: 10px;
    margin: 0 0 4px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 1;
  }
  .unit {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    padding: 16px 12px;
    min-width: 74px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(255,61,138,0.15);
  }
  .unit .num {
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(1.7rem, 7vw, 2.3rem);
    font-weight: 700;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 18px rgba(255,210,74,0.4);
  }
  .unit .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #f0d9ff;
    margin-top: 6px;
    font-weight: 500;
  }
  .date-line {
    margin-top: 18px;
    color: #f0d9ff;
    font-size: 0.9rem;
    text-align: center;
    z-index: 1;
    font-weight: 500;
  }

  .tz-block {
    width: 100%;
    max-width: 480px;
    margin-top: 36px;
    z-index: 1;
  }
  .tz-label {
    text-align: center;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .gift-section {
    width: 100%;
    max-width: 480px;
    margin-top: 48px;
    z-index: 1;
  }
  .gift-section h2 {
    text-align: center;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
  }
  .gift-section .hint {
    text-align: center;
    color: #f0d9ff;
    font-size: 0.88rem;
    margin: 6px 0 22px;
  }
  .gift-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .gift-card {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    padding: 18px 20px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    text-align: left;
    color: white;
    font-family: inherit;
  }
  .gift-card:hover {
    border-color: var(--teal);
    background: rgba(45,212,200,0.1);
  }
  .gift-card:active { transform: scale(0.97); }
  .gift-card.selected {
    border-color: var(--gold);
    background: rgba(255,210,74,0.15);
    box-shadow: 0 0 24px rgba(255,210,74,0.25);
  }
  .gift-emoji { font-size: 1.7rem; margin-bottom: 6px; display: block; }
  .gift-title {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1.08rem;
  }
  .gift-desc { font-size: 0.85rem; color: #e6d4f5; margin-top: 4px; line-height: 1.45; }
  .gift-tag {
    display: inline-block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    background: linear-gradient(90deg, var(--hotpink), var(--purple));
    color: white;
    padding: 3px 10px;
    border-radius: 999px;
    margin-top: 8px;
  }

  .result {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    margin: 0;
    text-align: center;
    background: #1b0a33;
    border-top: 2px solid rgba(255,210,74,0.3);
    border-radius: 20px 20px 0 0;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 9999;
    isolation: isolate;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
  }
  .result.show { transform: translateY(0); }
  .result .big { font-family: 'Baloo 2', sans-serif; font-size: 1.05rem; margin-bottom: 4px; color: var(--gold); line-height: 1.3; }
  .result .small { font-size: 0.78rem; color: #f0d9ff; }
  .confirm-btn {
    margin-top: 12px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--bg3);
    background: linear-gradient(90deg, var(--gold), var(--pink));
    border: none;
    padding: 12px 28px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,210,74,0.3);
    transition: transform 0.15s ease;
    width: 100%;
    max-width: 320px;
  }
  .confirm-btn:active { transform: scale(0.96); }
  .confirm-btn:disabled {
    background: rgba(255,255,255,0.15);
    color: #cfcfe8;
    box-shadow: none;
    cursor: default;
  }
  .change-link {
    display: block;
    margin-top: 10px;
    font-size: 0.78rem;
    color: #d9bfee;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  .confirmed-banner {
    margin-top: 10px;
    font-size: 0.95rem;
    color: var(--gold);
    font-weight: 600;
  }

  footer {
    margin-top: 50px;
    font-size: 0.8rem;
    color: #c9a7e0;
    text-align: center;
    position: relative;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="topper">🎈🎉🎂🎉🎈</div>
<h1>Lyz's Birthday!</h1>
<p class="subtitle">The countdown to her big day is on ✨</p>

<div class="tz-block">
  <div class="tz-label">🇺🇸 Eastern (EST/EDT)</div>
  <div class="countdown" id="countdown-est">
    <div class="unit"><div class="num" id="est-days">--</div><div class="label">Days</div></div>
    <div class="unit"><div class="num" id="est-hours">--</div><div class="label">Hours</div></div>
    <div class="unit"><div class="num" id="est-minutes">--</div><div class="label">Minutes</div></div>
    <div class="unit"><div class="num" id="est-seconds">--</div><div class="label">Seconds</div></div>
  </div>
</div>

<div class="tz-block">
  <div class="tz-label">🇰🇭 Cambodia (ICT)</div>
  <div class="countdown" id="countdown-ict">
    <div class="unit"><div class="num" id="ict-days">--</div><div class="label">Days</div></div>
    <div class="unit"><div class="num" id="ict-hours">--</div><div class="label">Hours</div></div>
    <div class="unit"><div class="num" id="ict-minutes">--</div><div class="label">Minutes</div></div>
    <div class="unit"><div class="num" id="ict-seconds">--</div><div class="label">Seconds</div></div>
  </div>
</div>

<div class="date-line">until October 25 🎂</div>

<div class="gift-section">
  <h2>🎁 Choose Your Gift 🎁</h2>
  <p class="hint">Tap one. Choose wisely.</p>
  <div class="gift-grid" id="giftGrid">
    <button class="gift-card" data-result="You picked a hug. Estimated retail value: priceless, allegedly. Redeemable any time, no shipping required. 🤗">
      <span class="gift-emoji">🤗</span>
      <span class="gift-title">One (1) Hug</span>
      <div class="gift-desc">Premium, ethically sourced, 100% organic affection. Limited availability.</div>
      <span class="gift-tag">Best Value*</span>
    </button>
    <button class="gift-card" data-result="You picked 'I Love You' said with feeling. No refunds, no exchanges, emotionally binding. ❤️">
      <span class="gift-emoji">❤️</span>
      <span class="gift-title">A Heartfelt "I Love You"</span>
      <div class="gift-desc">Delivered with direct eye contact for maximum emotional impact.</div>
    </button>
    <button class="gift-card" data-result="You picked a coupon for one (1) free chore. Terms and conditions apply. Mostly the term is 'eventually.' 🧹">
      <span class="gift-emoji">🧾</span>
      <span class="gift-title">IOU: One Free Chore</span>
      <div class="gift-desc">Redeemable for dishes, laundry, or "I'll get to it." Expires never.</div>
    </button>
    <button class="gift-card" data-result="You picked me. Bold choice. No returns, no warranty, mild assembly required (mostly emotional). 😏">
      <span class="gift-emoji">🙋</span>
      <span class="gift-title">Me</span>
      <div class="gift-desc">Already yours, technically. But hey, it's the thought that counts.</div>
    </button>
    <button class="gift-card" data-result="You picked the cash. Bold, honest, zero assembly required. $100 incoming. 💸">
      <span class="gift-emoji">💵</span>
      <span class="gift-title">$100 Cash</span>
      <div class="gift-desc">No notes. No surprises. Just pure, unrestricted spending power.</div>
    </button>
  </div>
</div>

<div class="result" id="result">
  <div class="big" id="resultText"></div>
  <div class="small" id="resultSubtext">Is this your final answer?</div>
  <button class="confirm-btn" id="confirmBtn">Confirm Selection 🎉</button>
  <button class="change-link" id="changeLink">Change my mind</button>
</div>

<footer>made with love for Lyz 💖</footer>

<script>
  // Compute the correct UTC instant for a given wall-clock time in a specific IANA timezone,
  // correctly handling DST (e.g. EST vs EDT) automatically.
  function zonedTimeToUtc(year, month, day, hour, minute, second, timeZone) {
    let utcGuess = Date.UTC(year, month, day, hour, minute, second);
    const dtf = new Intl.DateTimeFormat('en-US', {
      timeZone, year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
    const parts = dtf.formatToParts(new Date(utcGuess));
    const map = {};
    parts.forEach(p => { map[p.type] = p.value; });
    const hourVal = map.hour === '24' ? 0 : parseInt(map.hour, 10);
    const displayedUTC = Date.UTC(
      parseInt(map.year, 10), parseInt(map.month, 10) - 1, parseInt(map.day, 10),
      hourVal, parseInt(map.minute, 10), parseInt(map.second, 10)
    );
    const diff = displayedUTC - utcGuess;
    return new Date(utcGuess - diff);
  }

  function getNextOct25InZone(timeZone) {
    const now = new Date();
    const nowInZoneStr = new Intl.DateTimeFormat('en-US', { timeZone, year: 'numeric' }).format(now);
    let year = parseInt(nowInZoneStr, 10);
    let target = zonedTimeToUtc(year, 9, 25, 0, 0, 0, timeZone);
    if (target < now) {
      target = zonedTimeToUtc(year + 1, 9, 25, 0, 0, 0, timeZone);
    }
    return target;
  }

  const targetEST = getNextOct25InZone('America/New_York');
  const targetICT = getNextOct25InZone('Asia/Phnom_Penh');

  function updateCountdownBlock(target, prefix) {
    const now = new Date();
    const diff = target - now;
    const container = document.getElementById('countdown-' + prefix);

    if (diff <= 0) {
      container.innerHTML = '<div class="unit"><div class="num">🎂</div><div class="label">Happy Birthday!</div></div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById(prefix + '-days').textContent = days;
    document.getElementById(prefix + '-hours').textContent = String(hours).padStart(2, '0');
    document.getElementById(prefix + '-minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById(prefix + '-seconds').textContent = String(seconds).padStart(2, '0');
  }

  function updateAllCountdowns() {
    updateCountdownBlock(targetEST, 'est');
    updateCountdownBlock(targetICT, 'ict');
  }

  updateAllCountdowns();
  setInterval(updateAllCountdowns, 1000);

  // Gift selection logic
  const cards = document.querySelectorAll('.gift-card');
  const resultBox = document.getElementById('result');
  const resultText = document.getElementById('resultText');
  const resultSubtext = document.getElementById('resultSubtext');
  const confirmBtn = document.getElementById('confirmBtn');
  const changeLink = document.getElementById('changeLink');

  let selectedCard = null;

  cards.forEach(card => {
    card.addEventListener('click', () => {
      cards.forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedCard = card;

      resultText.textContent = card.dataset.result;
      resultSubtext.textContent = 'Is this your final answer?';
      resultSubtext.classList.remove('confirmed-banner');
      confirmBtn.style.display = 'inline-block';
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Confirm Selection 🎉';
      changeLink.style.display = 'inline-block';
      resultBox.classList.add('show');
    });
  });

  confirmBtn.addEventListener('click', () => {
    if (!selectedCard) return;

    const giftTitle = selectedCard.querySelector('.gift-title').textContent;

    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Confirmed ✅';
    changeLink.style.display = 'none';
    resultSubtext.textContent = `"${giftTitle}" has been locked in. No takebacks. 😄`;
    resultSubtext.classList.add('confirmed-banner');
    cards.forEach(c => c.style.pointerEvents = 'none');
    cards.forEach(c => { if (c !== selectedCard) c.style.opacity = '0.5'; });

    fetch('https://formspree.io/f/xrewaooe', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gift_chosen: giftTitle,
        timestamp: new Date().toString(),
        status: 'confirmed'
      })
    }).catch(err => console.error('Formspree submission failed:', err));
  });

  changeLink.addEventListener('click', () => {
    cards.forEach(c => c.classList.remove('selected'));
    selectedCard = null;
    resultBox.classList.remove('show');
  });

  // Confetti
  const confettiEmojis = ['🎉','✨','🎊','💖','⭐'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (6 + Math.random() * 6) + 's';
    el.style.animationDelay = (Math.random() * 6) + 's';
    document.body.appendChild(el);
  }

  // Floating balloons
  const balloonEmojis = ['🎈'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'balloon';
    el.textContent = balloonEmojis[0];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (10 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(el);
  }
</script>

</body>
</html>
